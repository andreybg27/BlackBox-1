name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Apk
    runs-on: ubuntu-latest
    env:
      # Принуждаваме GitHub да използва Node 24, за да избегнем депрекацията
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Тук беше грешката - напълно премахваме реда с cache, за да не гърми
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Добавяме --no-daemon за по-стабилно изграждане в GitHub
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload Apk
        uses: actions/upload-artifact@v4
        with:
          name: BlackBox-Aim-Assistant
          path: app/build/outputs/apk/debug/*.apk
